name: Docker Build -> Push -> Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOC_PASSWORD }}" | docker login -u "${{ secrets.DOC_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOC_USERNAME }}/spring-boot-vsi:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOC_USERNAME }}/spring-boot-vsi:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop spring-demo || true
            docker rm spring-demo || true
            docker pull ${{ secrets.DOC_USERNAME }}/spring-boot-vsi:latest
            docker run -d \
              --name spring-demo \
              --restart unless-stopped \
              -p 8080:8080 \
              ${{ secrets.DOC_USERNAME }}/spring-boot-vsi:latest
